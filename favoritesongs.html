<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎀 Music For Every Mood 🎀</title>

<style>

body{
    margin:0;
    padding:0;
    background:#ffe6f2;
    font-family:'Comic Sans MS', cursive;
    text-align:center;
    overflow-x:hidden;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    z-index:-1;
}

.hearts span{
    position:absolute;
    font-size:25px;
    animation:fall 10s linear infinite;
    opacity:0.4;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
    }
    100%{
        transform:translateY(110vh);
    }
}

/* Heading */

h1{
    color:#ff4da6;
    font-size:50px;
    margin-top:20px;
}

.subtitle{
    font-size:22px;
    color:#666;
}

/* Banner */

.music-banner{
    width:85%;
    max-width:700px;
    border-radius:25px;
    margin-top:20px;
    box-shadow:0 5px 15px rgba(255,105,180,0.4);
}

/* Quote */

#quote{
    background:white;
    width:80%;
    max-width:700px;
    margin:20px auto;
    padding:15px;
    border-radius:20px;
    color:#ff4da6;
    font-size:20px;
}

/* Mood Box */

.mood-box{
    width:85%;
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.mood-box h2{
    color:#ff4da6;
}

/* Buttons */

.mood-btn{
    background:#ff66b2;
    color:white;
    border:none;
    padding:15px 25px;
    margin:10px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.mood-btn:hover{
    transform:scale(1.08);
}

/* Playlist */

#playlist{
    margin-top:30px;
}

.song-card{
    background:#fff0f7;
    margin:15px auto;
    width:80%;
    padding:15px;
    border-radius:20px;
}

.song-card a{
    text-decoration:none;
    color:#ff1493;
    font-size:20px;
}

/* Footer */

footer{
    margin-top:40px;
    padding:20px;
    color:#ff4da6;
    font-size:18px;
}

</style>
</head>

<body>

<div class="hearts">
<span style="left:10%">💖</span>
<span style="left:25%">🌸</span>
<span style="left:40%">🎀</span>
<span style="left:60%">💕</span>
<span style="left:80%">✨</span>
</div>

<h1>🎀 Music For Every Mood 🎀</h1>

<p class="subtitle">
💕 Because every feeling deserves a soundtrack 💕
</p>

<!-- Replace image with your own -->
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=1200"
class="music-banner">

<div id="quote"></div>

<div class="mood-box">

<h2>💖 How Are You Feeling Today? 💖</h2>

<button class="mood-btn" onclick="showSongs('happy')">🌸 Happy</button>

<button class="mood-btn" onclick="showSongs('sad')">💔 Sad</button>

<button class="mood-btn" onclick="showSongs('love')">💕 Romantic</button>

<button class="mood-btn" onclick="showSongs('night')">🌙 Midnight</button>

<button class="mood-btn" onclick="showSongs('main')">✨ Main Character</button>

<button class="mood-btn" onclick="showSongs('rain')">☔ Rainy Mood</button>

<div id="playlist">

🌷 Pick a mood and let the music hug you 🌷

</div>

</div>

<footer>
🎶 Made with love, sparkles & good music 🎶
</footer>

<script>

const quotes = [
"🌸 You're doing amazing sweetie!",
"🎀 Stay soft but never weak.",
"💖 Music understands feelings words can't.",
"✨ Main character energy activated.",
"🧸 You deserve all good things."
];

document.getElementById("quote").innerHTML =
quotes[Math.floor(Math.random()*quotes.length)];

function showSongs(mood){

let songs = "";

if(mood=="happy"){

songs=`
<h2>🌸 Happy Playlist 🌸</h2>

<p>☀️ Sunshine detected! Time for happy songs!</p>

<div class="song-card">
<a href="https://youtu.be/ZbZSe6N_BXs" target="_blank">
🎵 Happy - Pharrell Williams
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/y6Sxv-sUYtM" target="_blank">
🎵 Count On Me
</a>
</div>
`;
}

else if(mood=="sad"){

songs=`
<h2>💔 Sad Playlist 💔</h2>

<p>🫂 Sending virtual hugs...</p>

<div class="song-card">
<a href="https://youtu.be/J_ub7Etch2U" target="_blank">
🎵 Let Her Go
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/450p7goxZqg" target="_blank">
🎵 Someone Like You
</a>
</div>
`;
}

else if(mood=="love"){

songs=`
<h2>💕 Romantic Playlist 💕</h2>

<p>🌷 Somebody has butterflies today...</p>

<div class="song-card">
<a href="https://youtu.be/GxldQ9eX2wo" target="_blank">
🎵 Until I Found You
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/450p7goxZqg" target="_blank">
🎵 Perfect
</a>
</div>
`;
}

else if(mood=="night"){

songs=`
<h2>🌙 Midnight Playlist 🌙</h2>

<p>✨ Headphones on, feelings on...</p>

<div class="song-card">
<a href="https://youtu.be/fHI8X4OXluQ" target="_blank">
🎵 Night Changes
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/RBumgq5yVrA" target="_blank">
🎵 Sweater Weather
</a>
</div>
`;
}

else if(mood=="main"){

songs=`
<h2>✨ Main Character Playlist ✨</h2>

<p>👑 The world is your movie.</p>

<div class="song-card">
<a href="https://youtu.be/e-ORhEE9VVg" target="_blank">
🎵 Blank Space
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/nfWlot6h_JM" target="_blank">
🎵 Shake It Off
</a>
</div>
`;
}

else if(mood=="rain"){

songs=`
<h2>☔ Rainy Mood Playlist ☔</h2>

<p>🌧 Window seat + coffee + music.</p>

<div class="song-card">
<a href="https://youtu.be/3JWTaaS7LdU" target="_blank">
🎵 I Will Always Love You
</a>
</div>

<div class="song-card">
<a href="https://youtu.be/kPa7bsKwL-c" target="_blank">
🎵 See You Again
</a>
</div>
`;
}

document.getElementById("playlist").innerHTML = songs;

}

</script>

</body>
</html>
